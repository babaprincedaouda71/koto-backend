spring:
  application:
    name: koto-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/koto
    username: koto_user
    password: koto_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: 404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970
    expiration: 86400000