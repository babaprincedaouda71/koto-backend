spring:
  application:
    name: koto-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/koto}
    username: ${DB_USERNAME:koto_user}
    password: ${DB_PASSWORD:koto_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}